spring.application.name=CoreBanking-API

# Server
server.port=8080

# MySQL — set MYSQL_USER / MYSQL_PASSWORD env vars or override defaults below
spring.datasource.url=jdbc:mysql://localhost:3306/corebankingdb?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger UI (SpringDoc OpenAPI)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT (use a long random secret in production; HS256 needs >= 256 bits)
security.jwt.secret=${JWT_SECRET:dev-only-change-me-min-32-chars-for-hs256-key!!}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

